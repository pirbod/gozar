apiVersion: v1
kind: ServiceAccount
metadata:
  name: gozar-relay
  namespace: gozar-production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gozar-relay
  namespace: gozar-production
  labels:
    app.kubernetes.io/name: gozar-relay
    app.kubernetes.io/part-of: gozar
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gozar-relay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gozar-relay
        app.kubernetes.io/part-of: gozar
    spec:
      serviceAccountName: gozar-relay
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: relay
          image: ghcr.io/pirbod/gozar-relay:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: quic
              containerPort: 6100
              protocol: UDP
          env:
            - name: RUST_LOG
              value: info
            - name: GOZAR_NODE_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: GOZAR_ROLE
              value: relay
            - name: GOZAR_CONTROL_PLANE_URL
              value: http://gozar-control-plane:8080
            - name: GOZAR_LISTEN_ADDR
              value: 0.0.0.0:6100
            - name: GOZAR_GATEWAY_ADDR
              value: gozar-gateway:6200
            - name: GOZAR_QUEUE_LIMIT
              value: "32"
            - name: GOZAR_CONTROL_SECRET
              valueFrom:
                secretKeyRef:
                  name: gozar-node-secrets
                  key: control-secret
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: "1"
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
---
apiVersion: v1
kind: Service
metadata:
  name: gozar-relay
  namespace: gozar-production
  labels:
    app.kubernetes.io/name: gozar-relay
    app.kubernetes.io/part-of: gozar
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gozar-relay
  ports:
    - name: quic
      port: 6100
      targetPort: quic
      protocol: UDP
