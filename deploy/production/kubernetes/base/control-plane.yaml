apiVersion: v1
kind: ServiceAccount
metadata:
  name: gozar-control-plane
  namespace: gozar-production
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gozar-control-plane
  namespace: gozar-production
  labels:
    app.kubernetes.io/name: gozar-control-plane
    app.kubernetes.io/part-of: gozar
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: gozar-control-plane
  template:
    metadata:
      labels:
        app.kubernetes.io/name: gozar-control-plane
        app.kubernetes.io/part-of: gozar
    spec:
      serviceAccountName: gozar-control-plane
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: control-plane
          image: ghcr.io/pirbod/gozar-control-plane:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: NODE_ENV
              value: "production"
            - name: CONTROL_STATE_FILE
              value: "/data/control-plane-state.json"
            - name: AUDIT_LOG_FILE
              value: "/data/audit.log.ndjson"
            - name: ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: gozar-control-plane-secrets
                  key: admin-token
            - name: CONTROL_SECRET
              valueFrom:
                secretKeyRef:
                  name: gozar-control-plane-secrets
                  key: control-secret
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            periodSeconds: 20
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: runtime-state
              mountPath: /data
      volumes:
        - name: runtime-state
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: gozar-control-plane
  namespace: gozar-production
  labels:
    app.kubernetes.io/name: gozar-control-plane
    app.kubernetes.io/part-of: gozar
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gozar-control-plane
  ports:
    - name: http
      port: 8080
      targetPort: http
      protocol: TCP
