name: gozar-private-access

services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: gozar
      POSTGRES_USER: gozar
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - control
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gozar -d gozar"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  profile-api:
    build:
      context: ../..
      dockerfile: deploy/private-access/docker/Dockerfile.profile-api
    environment:
      PROFILE_ENVIRONMENT: staging
      PROFILE_DATABASE_URL: postgresql+psycopg://gozar:${POSTGRES_PASSWORD}@postgres/gozar
      PROFILE_ENABLE_DEMO_API: "false"
      PROFILE_ALLOW_DEMO_PRIVATE_KEYS: "false"
      PROFILE_SAFETY_MODE: private_access
      PROFILE_ADMIN_TOKEN: ${PROFILE_ADMIN_TOKEN:?set PROFILE_ADMIN_TOKEN}
      PROFILE_ENROLLMENT_TOKEN: ${PROFILE_ENROLLMENT_TOKEN:?set PROFILE_ENROLLMENT_TOKEN}
      PROFILE_DEVICE_TOKEN_PEPPER: ${PROFILE_DEVICE_TOKEN_PEPPER:?set PROFILE_DEVICE_TOKEN_PEPPER}
      PROFILE_ISSUER_PRIVATE_KEY: ${PROFILE_ISSUER_PRIVATE_KEY:?set PROFILE_ISSUER_PRIVATE_KEY}
      PROFILE_ISSUER_KEY_ID: staging-issuer-v1
      PROFILE_GATEWAY_PUBLIC_KEY: ${PROFILE_GATEWAY_PUBLIC_KEY:?set PROFILE_GATEWAY_PUBLIC_KEY}
      PROFILE_GATEWAY_ENDPOINT: ${PROFILE_GATEWAY_ENDPOINT:-10.0.2.2:51820}
      PROFILE_CLIENT_ADDRESS_POOL: 10.77.0.0/24
      PROFILE_APPROVED_ROUTES: 10.88.0.0/24
      PROFILE_APPROVED_SERVICES: '[{"id":"internal-status","name":"Internal status","host":"10.88.0.10","port":8080,"protocol":"http"}]'
      PROFILE_DNS_SERVERS: ""
      PROFILE_CORS_ORIGINS: https://gozar.internal
    command:
      - sh
      - -c
      - alembic -c /app/alembic.ini upgrade head && exec uvicorn profile_api.main:app --host 0.0.0.0 --port 8095 --proxy-headers --forwarded-allow-ips=*
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    networks:
      - control
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8095/readyz', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  caddy:
    image: caddy:2.11.4-alpine
    ports:
      - "127.0.0.1:8443:8443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      control:
        aliases:
          - gozar.internal
    depends_on:
      profile-api:
        condition: service_healthy
    restart: unless-stopped

  gateway:
    build:
      context: ../..
      dockerfile: deploy/private-access/docker/Dockerfile.gateway
    environment:
      WIREGUARD_PRIVATE_KEY: ${PROFILE_GATEWAY_PRIVATE_KEY:?set PROFILE_GATEWAY_PRIVATE_KEY}
      PROFILE_ADMIN_TOKEN: ${PROFILE_ADMIN_TOKEN:?set PROFILE_ADMIN_TOKEN}
      PROFILE_API_INTERNAL_URL: http://profile-api:8095
      WG_ADDRESS: 10.77.0.1/24
      SERVICE_CIDR: 10.88.0.0/24
      SERVICE_HOST: 10.88.0.10
      SERVICE_PORT: "8080"
    cap_add:
      - NET_ADMIN
    sysctls:
      net.ipv4.ip_forward: "1"
    ports:
      - "127.0.0.1:51820:51820/udp"
    read_only: true
    tmpfs:
      - /tmp:size=8m,mode=1777
      - /run:size=8m,mode=0755
    networks:
      - control
      - private-services
    depends_on:
      profile-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wg", "show", "wg0"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  internal-status:
    build:
      context: ../..
      dockerfile: deploy/private-access/docker/Dockerfile.synthetic-service
    read_only: true
    networks:
      private-services:
        ipv4_address: 10.88.0.10
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

networks:
  control:
    internal: true
  private-services:
    internal: true
    ipam:
      config:
        - subnet: 10.88.0.0/24

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
