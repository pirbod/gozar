name: ci

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all --check
      - name: Lint
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - name: Install
        run: npm install
      - name: Typecheck
        run: npm run typecheck:ts
      - name: Test
        run: npm run test:ts
      - name: Build
        run: npm run build:ts

  e2e:
    runs-on: ubuntu-latest
    needs:
      - rust
      - typescript
    steps:
      - uses: actions/checkout@v6
      - name: End-to-end smoke test
        run: |
          set -euo pipefail

          cleanup() {
            docker compose down -v --remove-orphans || true
          }

          fail() {
            echo "$1" >&2
            docker compose logs || true
            exit 1
          }

          wait_for_health() {
            local attempts="$1"
            local delay_seconds="$2"
            for _ in $(seq 1 "$attempts"); do
              if curl -fsS http://127.0.0.1:8080/healthz >/dev/null; then
                return 0
              fi
              sleep "$delay_seconds"
            done
            return 1
          }

          wait_for_nodes() {
            local attempts="$1"
            local delay_seconds="$2"
            local state
            for _ in $(seq 1 "$attempts"); do
              state="$(curl -fsS http://127.0.0.1:8080/api/v1/state -H 'x-gozar-admin-token: gozar-admin-token' || true)"
              if [[ -n "$state" ]] && python3 -c 'import json, sys; data = json.loads(sys.stdin.read()); nodes = {node["node_id"] for node in data["nodes"]}; required = {"desktop-client-1", "relay-1", "gateway-1"}; sys.exit(0 if required.issubset(nodes) else 1)' <<<"$state"; then
                return 0
              fi
              sleep "$delay_seconds"
            done
            echo "$state"
            return 1
          }

          wait_for_research_listener() {
            local attempts="$1"
            local delay_seconds="$2"
            for _ in $(seq 1 "$attempts"); do
              if curl -fsS http://127.0.0.1:7100/healthz >/dev/null; then
                return 0
              fi
              sleep "$delay_seconds"
            done
            return 1
          }

          send_message() {
            python3 -c 'import socket, sys; message = sys.argv[1]; sock = socket.create_connection(("127.0.0.1", 7000), timeout=5); sock.settimeout(5); sock.sendall((message + "\n").encode()); print(sock.makefile("rb").readline().decode().strip()); sock.close()' "$1"
          }

          assert_contains() {
            local haystack="$1"
            local needle="$2"
            local message="$3"
            if [[ "$haystack" != *"$needle"* ]]; then
              fail "$message\nResponse: $haystack"
            fi
          }

          trap cleanup EXIT

          docker compose down -v --remove-orphans || true
          docker compose up --build -d

          wait_for_health 30 2 || fail "control plane did not become healthy"
          wait_for_nodes 30 2 || fail "control plane did not observe all expected nodes"

          direct_response=""
          for _ in $(seq 1 15); do
            if direct_response="$(send_message 'hello from direct path')" && [[ "$direct_response" == *"path=direct"* ]]; then
              break
            fi
            sleep 2
          done
          echo "$direct_response"
          assert_contains "$direct_response" "path=direct" "direct overlay path did not become active"
          assert_contains "$direct_response" "gateway-1(" "direct response did not include gateway hop"

          curl -fsS -X POST http://127.0.0.1:8080/api/v1/admin/preferred-path \
            -H 'content-type: application/json' \
            -H 'x-gozar-admin-token: gozar-admin-token' \
            -d '{"preferred_path":"relay","switch_reason":"ci relay smoke test"}' >/dev/null

          relay_response=""
          for _ in $(seq 1 15); do
            if relay_response="$(send_message 'hello from relay path')" && [[ "$relay_response" == *"path=relay"* ]]; then
              break
            fi
            sleep 2
          done
          echo "$relay_response"
          assert_contains "$relay_response" "path=relay" "relay overlay path did not become active"
          assert_contains "$relay_response" "relay-1(" "relay response did not include relay hop"
          assert_contains "$relay_response" "gateway-1(" "relay response did not include gateway hop"

          if curl -fsS http://127.0.0.1:7100/healthz >/dev/null 2>&1; then
            fail "research gateway listener should be disabled by default"
          fi

          docker compose down -v --remove-orphans || true
          GOZAR_ENABLE_RESEARCH_GATEWAY=true docker compose up --build -d

          wait_for_health 30 2 || fail "control plane did not become healthy after enabling research gateway"
          wait_for_nodes 30 2 || fail "control plane did not observe all expected nodes after enabling research gateway"
          wait_for_research_listener 30 2 || fail "research gateway listener did not become ready"

          research_response=""
          for _ in $(seq 1 15); do
            if research_response="$(curl -fsS 'http://127.0.0.1:7100/research-fetch?url=http://control-plane:8080/healthz')"; then
              break
            fi
            sleep 2
          done
          echo "$research_response"
          assert_contains "$research_response" "gozar-control-plane" "research gateway did not reach the lab HTTP target"

  eval-smoke:
    runs-on: ubuntu-latest
    needs:
      - rust
      - typescript
    steps:
      - uses: actions/checkout@v6
      - name: CI-safe evaluation smoke test
        run: make eval-smoke
      - name: Upload evaluation results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gozar-eval-results
          path: eval/results/latest
      - name: Cleanup evaluation stack
        if: always()
        run: make eval-clean
