name: terraform

on:
  pull_request:
  push:
    branches: [main, "codex/**"]
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform report
        run: python3 scripts/platform/run_terraform_check.py
      - name: Upload Terraform report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: terraform-check-report
          path: |
            runtime/reports/terraform-check-report.md
            runtime/reports/terraform-check-report.json
