name: gorz-ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  gorz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install Python backend
        run: python -m pip install -e "python/gorz_api[dev]"

      - name: Python tests
        run: cd python/gorz_api && pytest

      - name: Python lint
        run: cd python/gorz_api && ruff check .

      - name: Install frontend
        run: npm ci

      - name: Frontend tests
        run: npm run test --workspace gorz-web

      - name: Frontend build
        run: npm run build --workspace gorz-web

      - name: Docker compose smoke
        run: |
          docker compose -f docker-compose.gorz.yml up --build -d
          python scripts/gorz/validate_gorz.py
          mkdir -p artifacts
          python scripts/gorz/export_demo_incident.py --output artifacts/gorz-demo-incident.json

      - name: Stop Docker compose
        if: always()
        run: |
          docker compose -f docker-compose.gorz.yml down -v

      - name: Upload demo incident artifact
        uses: actions/upload-artifact@v4
        with:
          name: gorz-demo-incident
          path: artifacts/gorz-demo-incident.json
