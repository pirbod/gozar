name: android

on:
  pull_request:
  push:
    branches: [main, "codex/**", "ci-node24-actions"]
  workflow_dispatch:

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4

      - name: Prepare Gradle shim
        run: chmod +x android/gorz/gradlew

      - name: Android unit tests
        working-directory: android/gorz
        run: ./gradlew testDemoDebugUnitTest testInternalDebugUnitTest

      - name: Android debug build
        working-directory: android/gorz
        run: ./gradlew assembleDemoDebug assembleInternalDebug

      - name: Android safety checks
        run: |
          python scripts/check_android_manifest_permissions.py
          python scripts/check_android_route_safety.py

      - name: Android screenshot report
        if: always()
        run: python scripts/android/capture_phase4_screenshots.py --report-only

      - name: Upload Android artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-build-artifacts
          path: |
            android/gorz/app/build/reports
            android/gorz/app/build/outputs/apk/*/debug/*.apk
            runtime/reports
