name: kubernetes

on:
  pull_request:
  push:
    branches: [main, "codex/**"]
  workflow_dispatch:

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-kubectl@v4
      - name: Render local overlay
        run: kubectl kustomize deploy/kubernetes/overlays/local > runtime-k8s-rendered.yaml
      - name: Client dry-run
        run: kubectl apply --dry-run=client --validate=false -k deploy/kubernetes/overlays/local
      - name: Upload rendered manifests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kubernetes-rendered
          path: runtime-k8s-rendered.yaml
