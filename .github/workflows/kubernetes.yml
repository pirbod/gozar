name: kubernetes

on:
  pull_request:
  push:
    branches: [main, "codex/**"]
  workflow_dispatch:

jobs:
  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-kubectl@v4
      - name: Validate local overlay
        run: python3 scripts/platform/run_k8s_check.py
      - name: Upload rendered manifests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kubernetes-rendered
          path: |
            runtime/reports/gozar-k8s-rendered.yaml
            runtime/reports/kubernetes-check-report.md
            runtime/reports/kubernetes-check-report.json
