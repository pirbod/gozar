name: profile-ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  profile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install profile API
        run: python -m pip install -e "python/profile_api[dev]"

      - name: Ruff
        run: cd python/profile_api && ruff check .

      - name: Pytest
        run: cd python/profile_api && pytest

      - name: Python syntax check
        run: make profile-syntax-check

      - name: Safety wording check
        run: python scripts/profile/check_safety_wording.py

      - name: Compose config
        run: docker compose -f docker-compose.profile.yml config

      - name: Build profile Docker image
        run: docker compose -f docker-compose.profile.yml build

      - name: Start profile API
        run: docker compose -f docker-compose.profile.yml up -d

      - name: Validate profile lifecycle
        run: python scripts/profile/validate_profile_lifecycle.py --api http://127.0.0.1:8095

      - name: Stop profile API
        if: always()
        run: docker compose -f docker-compose.profile.yml down -v
