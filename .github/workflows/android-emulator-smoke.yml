name: android-emulator-smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 3 * * *"

jobs:
  emulator-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3
      - uses: gradle/actions/setup-gradle@v4

      - name: Prepare Gradle shim
        run: chmod +x android/gorz/gradlew

      - name: Unit tests
        working-directory: android/gorz
        run: ./gradlew testDebugUnitTest

      - name: Assemble debug
        working-directory: android/gorz
        run: ./gradlew assembleDebug

      - name: Managed-device smoke test
        working-directory: android/gorz
        run: ./gradlew pixel2api30DebugAndroidTest

      - name: Generate emulator smoke report
        if: always()
        run: python scripts/android/run_emulator_smoke_report.py

      - name: Generate screenshot report
        if: always()
        run: python scripts/android/capture_phase4_screenshots.py --report-only

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-emulator-smoke-artifacts
          path: |
            android/gorz/app/build/reports
            android/gorz/app/build/outputs/apk/debug
            runtime/reports/android-emulator-smoke-report.md
            runtime/reports/android-emulator-smoke-report.json
            runtime/reports/screenshots/phase4
