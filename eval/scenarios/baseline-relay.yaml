name: baseline-relay
description: Relay-path baseline with no impairment. Used to estimate relay fallback overhead against the direct path.
mode: static-relay
preferred_path: relay
affected_service: none
affected_path: relay
impairment_type: none
duration_seconds: 15
request_count: 16
request_interval_seconds: 0.25
settle_seconds: 3
ci_safe: true
expected_behavior: Requests should complete through the relay and gateway path without intentional impairment.
metrics_to_collect:
  - connection_setup_time
  - time_to_first_successful_request
  - request_success_rate
  - median_latency
  - p95_latency
  - throughput_estimate
  - selected_path_over_time
  - error_counts_by_category
