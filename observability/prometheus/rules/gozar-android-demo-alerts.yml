groups:
  - name: gozar-android-demo
    rules:
      - alert: RoutePolicyViolationDetected
        expr: increase(route_policy_blocked_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Route policy blocked an unsafe requested scope.
      - alert: EvidenceRedactionFailure
        expr: evidence_redaction_failure_total > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: Evidence redaction failure detected.
      - alert: EmulatorSmokeFailed
        expr: emulator_smoke_status == 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: Emulator smoke failed or was unavailable.
