    <text class="h2" x="42" y="657">Diagnostics</text>
    <rect class="card" x="206" y="622" width="160" height="58" rx="8"/>
    <text class="h2" x="224" y="657">Evidence</text>
    <rect class="card" x="24" y="696" width="160" height="58" rx="8"/>
