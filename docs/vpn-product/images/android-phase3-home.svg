  <text class="green" x="250" y="454" font-family="Ubuntu Sans, DejaVu Sans, Arial" font-size="13" font-weight="700">passed</text>
  <text class="body" x="42" y="482">Applied route</text>
  <text class="mono" x="250" y="482">10.77.0.0/24</text>
