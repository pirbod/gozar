<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-label="Gorz Phase 3 home screen prototype screenshot">
  <defs>
    <linearGradient id="screen" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="1" stop-color="#0b1722"/>
    </linearGradient>
    <style>
      .bg { fill: url(#screen); }
      .card { fill: #172431; stroke: #314454; stroke-width: 1; }
      .panel { fill: #101820; stroke: #263545; stroke-width: 1; }
      .title { font: 700 30px "Ubuntu Sans", "DejaVu Sans", Arial, sans-serif; fill: #eaf6ff; }
      .h2 { font: 700 19px "Ubuntu Sans", "DejaVu Sans", Arial, sans-serif; fill: #eaf6ff; }
      .body { font: 500 13px "Ubuntu Sans", "DejaVu Sans", Arial, sans-serif; fill: #afc4d5; }
      .label { font: 700 11px "Ubuntu Sans", "DejaVu Sans", Arial, sans-serif; fill: #cfefff; letter-spacing: .2px; }
      .mono { font: 600 12px "Ubuntu Mono", "DejaVu Sans Mono", monospace; fill: #eaf6ff; }
      .cyan { fill: #23c7ff; }
      .green { fill: #42e686; }
      .amber { fill: #ffbf47; }
      .red { fill: #ff6b6b; }
      .muted { fill: #314454; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="390" height="844"/>
  <rect x="18" y="20" width="354" height="804" rx="34" fill="none" stroke="#263545" stroke-width="3"/>
  <text class="title" x="34" y="72">Gorz</text>
