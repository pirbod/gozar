  <rect x="0" y="780" width="390" height="64" fill="#101820"/>
  <text class="cyan" x="37" y="817" font-family="Ubuntu Sans, DejaVu Sans, Arial" font-size="12" font-weight="700">Home</text>
  <text class="body" x="104" y="817">Session</text>
