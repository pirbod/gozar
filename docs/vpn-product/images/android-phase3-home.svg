  <path d="M306 146 A41 41 0 1 1 268 202" fill="none" stroke="#23c7ff" stroke-width="10" stroke-linecap="round"/>
  <text class="h2" x="286" y="194">90</text>
  <rect x="42" y="232" width="112" height="26" rx="13" fill="#263545"/>
  <text class="mono" x="55" y="249">demo_split</text>
  <rect x="164" y="232" width="145" height="26" rx="13" fill="#12384a"/>
