<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-label="Gorz Phase 3 evidence and safety prototype screenshot">
  <defs>
    <style>
      .bg { fill: #071018; }
      .card { fill: #172431; stroke: #314454; stroke-width: 1; }
      .panel { fill: #101820; stroke: #263545; stroke-width: 1; }
      .title { font: 700 28px "Ubuntu Sans", "DejaVu Sans", Arial, sans-serif; fill: #eaf6ff; }
      .h2 { font: 700 17px "Ubuntu Sans", "DejaVu Sans", Arial, sans-serif; fill: #eaf6ff; }
      .body { font: 500 12px "Ubuntu Sans", "DejaVu Sans", Arial, sans-serif; fill: #afc4d5; }
      .mono { font: 500 11px "Ubuntu Mono", "DejaVu Sans Mono", monospace; fill: #dff7ff; }
      .cyan { fill: #23c7ff; }
      .green { fill: #42e686; }
      .red { fill: #ff6b6b; }
      .amber { fill: #ffbf47; }
    </style>
  </defs>
  <rect class="bg" width="390" height="844"/>
  <rect x="18" y="20" width="354" height="804" rx="34" fill="none" stroke="#263545" stroke-width="3"/>
  <text class="title" x="30" y="72">Evidence</text>
