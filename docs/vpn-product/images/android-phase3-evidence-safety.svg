  <text class="green" x="204" y="246" font-family="Ubuntu Sans, DejaVu Sans, Arial" font-size="12" font-weight="700">Session ID redacted</text>
  <text class="body" x="48" y="272">No public IP  |  No location  |  No contacts</text>
  <text class="body" x="48" y="292">No packet payload  |  No automatic upload</text>
  <rect class="panel" x="30" y="326" width="330" height="252" rx="8"/>
  <text class="mono" x="48" y="354">{</text>
  <text class="mono" x="62" y="374">"app_phase": "phase_3_android_prototype",</text>
  <text class="mono" x="62" y="394">"session_status": "Demo Session Active",</text>
  <text class="mono" x="62" y="414">"confidence_score": 90,</text>
  <text class="mono" x="62" y="434">"selected_mode": "demo_split_tunnel",</text>
  <text class="mono" x="62" y="454">"applied_route_scope": "10.77.0.0/24",</text>
  <text class="mono" x="62" y="474">"blocked_route_scope": "0.0.0.0/0",</text>
  <text class="mono" x="62" y="494">"validation_results": {"route_scope":"pass"},</text>
  <text class="mono" x="62" y="514">"safety_boundaries": ["no_packet_payload"],</text>
  <text class="mono" x="62" y="534">"audit_event_count": 14</text>
  <text class="mono" x="48" y="554">}</text>
  <text class="title" x="30" y="632">Safety pause</text>
  <rect class="card" x="30" y="656" width="330" height="116" rx="8"/>
  <text class="h2" x="48" y="688">Pause active</text>
  <text class="body" x="48" y="714">New sessions cannot start.</text>
  <rect x="266" y="676" width="58" height="32" rx="16" fill="#ff6b6b"/>
  <circle cx="308" cy="692" r="12" fill="#fff1f1"/>
  <rect x="48" y="730" width="116" height="28" rx="8" fill="#263545"/>
  <text class="body" x="66" y="749">Resume</text>
  <rect x="176" y="730" width="142" height="28" rx="8" fill="#12384a"/>
  <text class="body" x="193" y="749">Apply pause</text>
  <rect x="30" y="790" width="330" height="30" rx="8" fill="#263545"/>
