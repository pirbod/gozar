name: production-release-template

on:
  workflow_dispatch:
  pull_request:
    paths:
      - Cargo.toml
      - Cargo.lock
      - rust/**
      - package.json
      - package-lock.json
      - ts/**
      - deploy/production/**
      - .github/workflows/production.yml

permissions:
  contents: read
  packages: write
  id-token: write
  security-events: write

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck:ts
      - run: npm run test:ts
      - run: npm run build:ts
      - run: npm audit --audit-level=high

  manifests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: azure/setup-kubectl@v4
      - run: kubectl kustomize deploy/production/kubernetes/base > /tmp/gozar-production.yaml

  images:
    runs-on: ubuntu-latest
    needs:
      - rust
      - typescript
    strategy:
      matrix:
        service:
          - gateway
          - relay
          - desktop-client
          - echo-service
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/production/docker/Dockerfile.rust
          build-args: SERVICE=${{ matrix.service }}
          push: false
          tags: ghcr.io/pirbod/gozar-${{ matrix.service }}:${{ github.sha }}
          provenance: true
          sbom: true

  control-plane-image:
    runs-on: ubuntu-latest
    needs:
      - typescript
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/production/docker/Dockerfile.control-plane
          push: false
          tags: ghcr.io/pirbod/gozar-control-plane:${{ github.sha }}
          provenance: true
          sbom: true
