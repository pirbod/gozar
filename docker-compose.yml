services:
  control-plane:
    build:
      context: .
      dockerfile: Dockerfile.node
    environment:
      PORT: "8080"
      CONTROL_SECRET: "gozar-local-shared-secret"
      ADMIN_TOKEN: "gozar-admin-token"
      GATEWAY_QUIC_ADDR: "gateway:6200"
      RELAY_QUIC_ADDR: "relay:6100"
      GATEWAY_QUEUE_LIMIT: "64"
      RELAY_QUEUE_LIMIT: "32"
      CLIENT_QUEUE_LIMIT: "16"
      RESEARCH_GATEWAY_ALLOWED: "${GOZAR_ENABLE_RESEARCH_GATEWAY:-false}"
      CONTROL_STATE_FILE: "/data/control-plane-state.json"
      AUDIT_LOG_FILE: "/data/audit.log.ndjson"
      OTEL_SERVICE_NAME: "gozar-control-plane"
    volumes:
      - ./runtime/control-plane:/data
    ports:
      - "8080:8080"
    healthcheck:
      test:
        - "CMD"
        - "node"
        - "-e"
        - "fetch('http://127.0.0.1:8080/healthz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s

  echo-service:
    build:
      context: .
      dockerfile: Dockerfile.rust
      args:
        SERVICE: echo-service
    environment:
      RUST_LOG: "info"
      ECHO_LISTEN_ADDR: "0.0.0.0:9000"
      OTEL_SERVICE_NAME: "gozar-echo-service"

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.rust
      args:
        SERVICE: gateway
    depends_on:
      control-plane:
        condition: service_healthy
      echo-service:
        condition: service_started
    cap_add:
      - NET_ADMIN
    environment:
      RUST_LOG: "info"
      GOZAR_NODE_ID: "gateway-1"
      GOZAR_ROLE: "gateway"
      GOZAR_CONTROL_PLANE_URL: "http://control-plane:8080"
      GOZAR_CONTROL_SECRET: "gozar-local-shared-secret"
      GOZAR_LISTEN_ADDR: "0.0.0.0:6200"
      GOZAR_ECHO_ADDR: "echo-service:9000"
      GOZAR_QUEUE_LIMIT: "64"
      GOZAR_HEARTBEAT_SECONDS: "5"
      GOZAR_ENABLE_RESEARCH_GATEWAY: "${GOZAR_ENABLE_RESEARCH_GATEWAY:-false}"
      GOZAR_RESEARCH_ALLOWED_ORIGINS: "${GOZAR_RESEARCH_ALLOWED_ORIGINS:-http://control-plane:8080}"
      OTEL_SERVICE_NAME: "gozar-gateway"

  relay:
    build:
      context: .
      dockerfile: Dockerfile.rust
      args:
        SERVICE: relay
    depends_on:
      control-plane:
        condition: service_healthy
      gateway:
        condition: service_started
    cap_add:
      - NET_ADMIN
    environment:
      RUST_LOG: "info"
      GOZAR_NODE_ID: "relay-1"
      GOZAR_ROLE: "relay"
      GOZAR_CONTROL_PLANE_URL: "http://control-plane:8080"
      GOZAR_CONTROL_SECRET: "gozar-local-shared-secret"
      GOZAR_LISTEN_ADDR: "0.0.0.0:6100"
      GOZAR_GATEWAY_ADDR: "gateway:6200"
      GOZAR_QUEUE_LIMIT: "32"
      GOZAR_HEARTBEAT_SECONDS: "5"
      OTEL_SERVICE_NAME: "gozar-relay"

  desktop-client:
    build:
      context: .
      dockerfile: Dockerfile.rust
      args:
        SERVICE: desktop-client
    depends_on:
      control-plane:
        condition: service_healthy
      gateway:
        condition: service_started
      relay:
        condition: service_started
    environment:
      RUST_LOG: "info"
      GOZAR_NODE_ID: "desktop-client-1"
      GOZAR_ROLE: "desktop-client"
      GOZAR_CONTROL_PLANE_URL: "http://control-plane:8080"
      GOZAR_CONTROL_SECRET: "gozar-local-shared-secret"
      GOZAR_LOCAL_LISTEN_ADDR: "0.0.0.0:7000"
      GOZAR_POLL_SECONDS: "5"
      GOZAR_QUEUE_LIMIT: "16"
      GOZAR_ENABLE_RESEARCH_GATEWAY: "${GOZAR_ENABLE_RESEARCH_GATEWAY:-false}"
      GOZAR_RESEARCH_LISTEN_ADDR: "0.0.0.0:7100"
      OTEL_SERVICE_NAME: "gozar-desktop-client"
    ports:
      - "7000:7000"
      - "7100:7100"